<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drama App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔍 Search -->
<input type="text" id="searchInput" placeholder="Search..." class="search-box"/>

<!-- 📂 Tabs -->
<div class="tabs">
  <span class="active" onclick="showHome()">Home</span>
  <span onclick="showTrending()">Trending</span>
</div>

<!-- 🎬 Grid -->
<div id="dramaList" class="grid"></div>

<!-- ▶ Player (hidden screen) -->
<div id="playerScreen" class="hidden">
  <button onclick="goBack()">⬅ Back</button>
  <iframe id="player" allowfullscreen></iframe>
</div>

<!-- 🔻 Bottom Nav -->
<div class="bottom-nav">
  <span onclick="showHome()">🏠 Home</span>
  <span onclick="showTrending()">🔥 Trending</span>
  <span>⭐ VIP</span>
  <span>👤 Me</span>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
