<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drama App</title>

  <!-- 🔥 Ads Script -->
  <script src="https://quge5.com/88/tag.min.js" data-zone="223347" async data-cfasync="false"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔍 Search -->
<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="Search dramas...">
</div>

<!-- 📂 Tabs -->
<div class="tabs">
  <span class="active" onclick="showHome()">POPULAR</span>
  <span onclick="showTrending()">TRENDING</span>
</div>

<!-- 🎬 Grid -->
<div id="dramaList" class="grid"></div>

<!-- ▶ Player Screen -->
<div id="playerScreen" class="hidden">
  <button class="back-btn" onclick="goBack()">← Back</button>

  <iframe 
    id="player"
    width="100%"
    height="220"
    src=""
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen>
  </iframe>

</div>

<!-- 🔻 Bottom Nav -->
<div class="bottom-nav">
  <div onclick="showHome()">🏠<p>Home</p></div>
  <div onclick="showTrending()">🔥<p>Trending</p></div>
  <div>⭐<p>VIP</p></div>
  <div>👤<p>Me</p></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
