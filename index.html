<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drama App</title>

  <!-- Ads -->
  <script src="https://quge5.com/88/tag.min.js" data-zone="223347" async></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Search -->
<div class="search-wrap">
  <input type="text" placeholder="Search dramas...">
</div>

<!-- Tabs -->
<div class="tabs">
  <span class="active" onclick="filterCategory(event,'popular')">POPULAR</span>
  <span onclick="filterCategory(event,'trending')">TRENDING</span>
  <span onclick="filterCategory(event,'hindi')">HINDI</span>
</div>

<!-- Grid -->
<div id="dramaList" class="grid"></div>

<!-- Player -->
<div id="playerScreen" class="hidden">
  <button class="back-btn" onclick="goBack()">← Back</button>

  <div class="video-container">
    <video id="player" controls autoplay></video>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div onclick="filterCategory(event,'popular')">🏠<p>Home</p></div>
  <div onclick="filterCategory(event,'trending')">🔥<p>Trending</p></div>
  <div>⭐<p>VIP</p></div>
  <div>👤<p>Me</p></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
