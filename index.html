<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drama App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔍 Search -->
<input type="text" id="searchInput" placeholder="Search..." class="search-box"/>

<!-- 📂 Categories -->
<div class="tabs">
  <span class="active">Popular</span>
  <span>Must Watch</span>
  <span>New & Hot</span>
</div>

<!-- 🎬 Drama Grid -->
<div id="dramaList" class="grid"></div>

<!-- ▶ Player -->
<div id="playerScreen" class="hidden">
  <button onclick="goBack()">⬅ Back</button>
  <iframe id="player" allowfullscreen></iframe>
</div>

<!-- 🔻 Bottom Nav -->
<div class="bottom-nav">
  <span>🏠 Home</span>
  <span>🔥 Trending</span>
  <span>⭐ VIP</span>
  <span>👤 Me</span>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
